# DedupCommando landing — Zola configuration.
# Static, multilingual (9 locales) marketing site. English is canonical at /en/;
# every language is locale-prefixed; / is the x-default entry.
#
# Locales are modelled as plain sections (content/<slug>/_index.md), NOT Zola's
# built-in [languages] table, so every language (including English) gets a
# /<slug>/ prefix and we keep full control of slugs (/zh-hans/, /pt-br/) and of
# the hreflang cluster.

base_url = "https://dedupcommando.github.io"
title = "DedupCommando"
description = "Safety-focused Linux CLI and TUI for finding duplicate files and reclaiming storage."
default_language = "en"
compile_sass = false

[markdown]
highlight_code = false

[extra]
version = "0.9.0-beta.1"
repo_url = "https://github.com/dedupcommando/DedupCommando"
# Published locales — kept in sync with content/<slug>/ sections.
locales = [
  { slug = "en",      hreflang = "en",      name = "English",            dir = "ltr", og_locale = "en_US" },
  { slug = "ar",      hreflang = "ar",      name = "العربية",             dir = "rtl", og_locale = "ar_AR" },
  { slug = "vi",      hreflang = "vi",      name = "Tiếng Việt",         dir = "ltr", og_locale = "vi_VN" },
  { slug = "es",      hreflang = "es",      name = "Español",            dir = "ltr", og_locale = "es_ES" },
  { slug = "zh-hans", hreflang = "zh-Hans", name = "简体中文",            dir = "ltr", og_locale = "zh_CN" },
  { slug = "pt-br",   hreflang = "pt-BR",   name = "Português (Brasil)", dir = "ltr", og_locale = "pt_BR" },
  { slug = "ru",      hreflang = "ru",      name = "Русский",            dir = "ltr", og_locale = "ru_RU" },
  { slug = "fr",      hreflang = "fr",      name = "Français",           dir = "ltr", og_locale = "fr_FR" },
  { slug = "hi",      hreflang = "hi",      name = "हिन्दी",               dir = "ltr", og_locale = "hi_IN" },
]
